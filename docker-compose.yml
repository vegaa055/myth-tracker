# Full stack: Next.js app + Neo4j. Suitable for a single small VM
# (AWS Lightsail / EC2, ~2 GB RAM — Neo4j memory is capped below).
#
#   docker compose up -d --build
#   NEO4J_URI=bolt://localhost:7687 npm run seed   # once, from the host
#
# Override the password in production:  NEO4J_PASSWORD=... docker compose up -d
services:
  neo4j:
    image: neo4j:5
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-mythtracker}
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=256m
    ports:
      - "7474:7474" # Neo4j Browser — close this port in production firewalls
      - "7687:7687" # Bolt — needed from the host only for seeding
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      # First boot on a fresh volume creates the store and can take a while;
      # don't count failures during that window.
      start_period: 90s

  app:
    build: .
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-mythtracker}
    ports:
      - "3000:3000"

volumes:
  neo4j-data:
